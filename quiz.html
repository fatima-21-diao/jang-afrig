<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF -8">
<title >Quiz --- Jàng Afrig </title >

<body>
<header >
<h1>Jàng Afrig </h1>
<p>Apprendre l'Afrique , un pays à la fois </p>
</header >
<nav>
<a href="index.html">Accueil </a> |
<a href="quiz.html">Jouer </a> |
<a href="scores.html">Mes Scores </a> |
<a href="apropos.html">À propos </a>
</nav>
<main>
<section >
<h2>Avant de jouer </h2>
<form>
<p>
<label for="pseudo">Votre pseudo :</label >
<input type="text" id="pseudo" name="pseudo"
placeholder="Ex. Fatou" required >
</p>
<p>
<label for="mode">Mode de jeu :</label >
<select id="mode" name="mode" required >
<option value="">-- Choisir un mode
--</option >
<option value="capitales">Capitales </option >
<option value="drapeaux">Drapeaux </option >
<option value="langues">Langues </option >
<option value="voisins">Voisins </option >
<option value="chrono">Chrono </option >
</select >
</p>
<p>
<label for="nbQuestions">Nombre de questions :</label>
<input type="number" id="nbQuestions" name="nbQuestions"
       min="5" max="20" value="10">
</p>
<p>Difficulté :</p>

<p>
<input type="radio" id="facile" name="difficulte" value="facile" checked>
<label for="facile">Facile</label>
</p>

<p>
<input type="radio" id="moyen" name="difficulte" value="moyen">
<label for="moyen">Moyen</label>
</p>

<p>
<input type="radio" id="difficile" name="difficulte" value="difficile">
<label for="difficile">Difficile</label>
</p>
<p>
<button type="submit">Commencer le quiz </button >
</p>
</form>
</section >
</main>
